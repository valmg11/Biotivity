<body>

<script>
    let altTheme = false;
    function changeTheme() {
        var alt = "url('../media/HomeAlt.png')";
        var norm = "url('../media/biotivity_game_background.png')";
        if (altTheme == true) {
            altTheme = false;
            document.body.style.backgroundImage = norm;  
        } else {
            document.body.style.backgroundImage = alt;
            altTheme = true;
        }
       
    }
</script>
    <!--Day Counter-->
    <div class="sun">

    </div>
